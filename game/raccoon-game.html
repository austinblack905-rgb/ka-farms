<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>K&A Farms – Raccoon Hunt</title>
<style>
:root{--gold:#f6d94a;--red:#ff2a1f;--white:#f4f4f4}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:#050505;display:flex;justify-content:center;align-items:center;font-family:Impact,Haettenschweiler,"Arial Narrow Bold",system-ui,sans-serif;color:var(--white);overflow:hidden}
#game-shell{width:min(100vw,1200px);aspect-ratio:16/9;position:relative;background:#000;overflow:hidden;border:2px solid #101010;box-shadow:0 0 45px rgba(0,0,0,.8)}
#raccoonGame,#gunCanvas{position:absolute;inset:0;width:100%;height:100%;display:block}

#gunCanvas{z-index:12;pointer-events:none;background:transparent}
.hud-panel{position:absolute;z-index:20;color:var(--white);text-shadow:0 3px 3px rgba(0,0,0,.95);pointer-events:none;letter-spacing:1px}
#leftHud{top:22px;left:24px;width:255px;padding:10px 14px 14px;background:linear-gradient(90deg,rgba(0,0,0,.72),rgba(0,0,0,.28),transparent);border-left:3px solid rgba(255,255,255,.25)}
.hud-group{display:grid;grid-template-columns:34px 1fr;gap:10px;align-items:center;padding:8px 0 12px;border-bottom:2px solid rgba(255,255,255,.35)}
.hud-group:last-child{border-bottom:none;padding-bottom:0}.hud-label{font-size:19px;line-height:1}.hud-value{font-size:38px;color:var(--gold);line-height:1;margin-top:4px}.hud-small-value{font-size:26px;color:var(--gold);line-height:1;margin-top:4px}
#scoreHud{top:24px;right:28px;text-align:right}#scoreHud .hud-label{font-size:24px}#scoreHud .hud-value{font-size:46px}
#healthDisplay{grid-column:1/span 2;font-size:24px;letter-spacing:3px;margin-top:6px;color:var(--red);filter:drop-shadow(0 2px 1px rgba(0,0,0,.75))}
.icon{width:28px;height:42px;display:inline-block;position:relative;filter:drop-shadow(0 2px 1px rgba(0,0,0,.8))}
.icon.bullet:before{content:"";position:absolute;left:8px;top:0;width:12px;height:35px;background:linear-gradient(#f9f9f9 0 24%,#e8e8e8 25% 80%,#c9c9c9 81%);clip-path:polygon(50% 0%,88% 18%,88% 100%,12% 100%,12% 18%);border:1px solid rgba(255,255,255,.65)}
.icon.bullet:after{content:"";position:absolute;left:5px;bottom:0;width:18px;height:5px;background:#e8e8e8;border:1px solid rgba(255,255,255,.65)}
.icon.mag:before{content:"";position:absolute;left:6px;top:2px;width:18px;height:36px;background:linear-gradient(90deg,#f3f3f3,#cfcfcf);border:2px solid #f4f4f4;box-shadow:inset 0 0 0 2px rgba(0,0,0,.2)}
.icon.mag:after{content:"";position:absolute;left:8px;top:7px;width:14px;height:26px;border-left:2px solid rgba(0,0,0,.5);border-right:2px solid rgba(0,0,0,.35)}
#controlsHint{left:24px;bottom:86px;font-size:17px;line-height:1.55;background:linear-gradient(90deg,rgba(0,0,0,.72),rgba(0,0,0,.28),transparent);padding:10px 14px;width:190px}
.key{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border:2px solid #fff;margin-right:9px;font-size:14px;line-height:1}
#reloadWarning{position:absolute;top:21%;left:50%;transform:translate(-50%,-50%);z-index:35;color:var(--red);font-size:56px;font-weight:900;letter-spacing:3px;text-shadow:0 5px 7px rgba(0,0,0,.95);display:none;pointer-events:none}
#titleScreen{position:absolute;inset:0;z-index:80;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 45%,rgba(255,255,255,.08),transparent 28%),linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.82));text-align:center;text-shadow:0 5px 8px rgba(0,0,0,.95)}
#titleContent{transform:translateY(-10px)}#titleContent h1{margin:0 0 12px;font-size:clamp(48px,8vw,92px);letter-spacing:4px;color:#fff}#titleContent p{margin:0 0 28px;font-family:system-ui,sans-serif;letter-spacing:1px;color:rgba(255,255,255,.78)}
.red-button{border:0;color:#fff;background:linear-gradient(90deg,transparent 0 7%,#8e2119 7% 93%,transparent 93%),linear-gradient(#b83325,#76190f);padding:14px 48px;font-size:28px;font-family:Impact,Haettenschweiler,"Arial Narrow Bold",sans-serif;letter-spacing:3px;cursor:pointer;text-shadow:0 2px 2px rgba(0,0,0,.85);box-shadow:0 8px 18px rgba(0,0,0,.45)}
.red-button:hover{filter:brightness(1.15)}
#endOverlay{position:absolute;left:0;right:0;bottom:0;min-height:210px;z-index:70;display:none;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent) top center/84% 2px no-repeat,rgba(0,0,0,.88);padding:22px 40px 24px;color:#fff;text-align:center;box-shadow:0 -18px 35px rgba(0,0,0,.55)}
#endTitle{font-size:42px;letter-spacing:3px;color:var(--red);margin-bottom:14px;text-shadow:0 4px 6px rgba(0,0,0,.9)}

#endStats div{font-size:22px;letter-spacing:1px}#endStats strong{display:block;color:var(--gold);font-size:34px;margin-top:4px}
#summaryHealthText{color:var(--red);font-size:26px!important;letter-spacing:2px;margin-top:6px}
#endButtons{display:flex;justify-content:center;gap:12px}.summary-btn{border:0;cursor:pointer;padding:10px 28px;font-size:22px;font-family:Impact,Haettenschweiler,"Arial Narrow Bold",sans-serif;color:#fff;letter-spacing:2px;background:#8e2119}.summary-btn.secondary{background:#242424;color:#ddd}
@media(max-width:800px){#leftHud{top:12px;left:12px;width:190px}.hud-label{font-size:14px}.hud-value{font-size:28px}.hud-small-value{font-size:20px}#healthDisplay{font-size:18px;letter-spacing:1px}#scoreHud .hud-value{font-size:34px}#endStats{grid-template-columns:repeat(2,1fr)}}
</style>

<body>
<div id="game-shell">
<canvas id="raccoonGame" width="1200" height="675"></canvas>
<canvas id="gunCanvas"></canvas>

<div id="titleScreen"><div id="titleContent"><h1>RED JUSTICE</h1><p>Bandit Road</p><button id="titleStartButton" class="red-button" type="button">START</button></div></div>

<div id="leftHud" class="hud-panel">
<div class="hud-group"><span class="icon bullet"></span><div><div class="hud-label">AMMO</div><div class="hud-value"><strong id="ammoLeft">100</strong> / <span id="maxAmmo">100</span></div></div></div>
<div class="hud-group"><span class="icon mag"></span><div><div class="hud-label">RELOADS LEFT</div><div class="hud-small-value"><strong id="reloadsLeft">3</strong> / <span id="maxReloads">3</span></div></div></div>
<div class="hud-group"><div class="hud-label" style="grid-column:1/span 2;">HEALTH</div><div id="healthDisplay">❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️</div></div>
</div>

<div id="scoreHud" class="hud-panel"><div class="hud-label">SCORE</div><div class="hud-value" id="score">0</div></div>

<div id="reloadWarning">RELOAD</div>

<div id="endOverlay"><div id="endTitle">SUMMARY</div><div id="endStats"><div>SCORE<strong id="summaryScore">0</strong></div><div>SHOTS HIT<strong id="summaryShotsHit">0</strong></div><div>SHOTS MISSED<strong id="summaryShotsMissed">0</strong></div><div>HEALTH REMAINING<div id="summaryHealthText">❤️❤️❤️</div></div></div><div id="endButtons"><button id="closeSummaryButton" class="summary-btn secondary" type="button">MENU</button><button id="playAgainButton" class="summary-btn" type="button">PLAY AGAIN</button></div></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }

</script>

<script type="module">
import * as THREE from "three";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

const DEBUG_THREE = true;
window.addEventListener("error", (e) => {
  console.error("Runtime error:", e.message, e.error);
  try { drawScene(); } catch (_) {}
});
window.addEventListener("unhandledrejection", (e) => {
  console.error("Unhandled promise rejection:", e.reason);
  try { drawScene(); } catch (_) {}
});

const canvas=document.getElementById("raccoonGame"),ctx=canvas.getContext("2d");
const gunCanvas=document.getElementById("gunCanvas");
const scoreEl=document.getElementById("score"),ammoLeftEl=document.getElementById("ammoLeft"),maxAmmoEl=document.getElementById("maxAmmo"),reloadsLeftEl=document.getElementById("reloadsLeft"),maxReloadsEl=document.getElementById("maxReloads"),healthDisplayEl=document.getElementById("healthDisplay"),reloadWarningEl=document.getElementById("reloadWarning");
const titleScreen=document.getElementById("titleScreen"),titleStartButton=document.getElementById("titleStartButton"),endOverlay=document.getElementById("endOverlay"),endTitleEl=document.getElementById("endTitle"),summaryScoreEl=document.getElementById("summaryScore"),summaryShotsHitEl=document.getElementById("summaryShotsHit"),summaryShotsMissedEl=document.getElementById("summaryShotsMissed"),summaryHealthTextEl=document.getElementById("summaryHealthText"),closeSummaryButton=document.getElementById("closeSummaryButton"),playAgainButton=document.getElementById("playAgainButton");

const bgImage=new Image();
bgImage.src="farmNightBackground.png";

const MAX_SHOTS=6,MAX_RELOADS=6,MAX_HEALTH=10,FIRE_INTERVAL=92,RELOAD_TIME=500,SPAWN_INTERVAL_START=1050,SPAWN_INTERVAL_MIN=390,DIFFICULTY_SCORE_TARGET=350,RACCOON_BASE_RADIUS=16,RACCOON_MAX_RADIUS=86,RACCOON_SPEED_MIN=.16,RACCOON_SPEED_MAX=.34;
const HORIZON_Y=canvas.height*.47,GROUND_Y=canvas.height*.93;
//--------Weapons--------
const WEAPONS = {
  revolver: {
    name:  "Revolver",
    fireMode: "semi",
    fireInterval: 150,
    maxShots: 6
  },
  m2: {
    name: "M2 Heavy",
    fireMode: "auto",
    fireInterval: 92,
    maxShots: 200
  }
};

let currentWeapon = WEAPONS.revolver;
let m2Ready = false;
let m2ChargeStartTime = performance.now();
let m2ChargeMs = 30000;

let raccoons=[],score=0,shots=0,shotsHit=0,shotsMissed=0,reloadsLeft=MAX_RELOADS,health=MAX_HEALTH,lastTime=0,lastSpawnTime=0,roundActive=false,mouseX=canvas.width/2,mouseY=canvas.height/2,isFiring=false,isReloading=false,lastShotTime=0,muzzleFlashTimer=0,screenFlashTimer=0,damageFlashTimer=0,recoilOffset=0,audioCtx=null;

maxAmmoEl.textContent=MAX_SHOTS;maxReloadsEl.textContent=MAX_RELOADS;

// ---------- Three.js model layer ----------
let renderer = null;
let scene = null;
let camera = null;
let gunRoot = null;
let gunModel = null;
let raccoonTemplate = null;
let raccoonModelPool = new Map();

// Tweak these if needed.
const GUN_POSITION = new THREE.Vector3(0.0, -1.35, -2.55);
const GUN_SCALE_TARGET = 2.00;
const AIM_YAW_AMOUNT = 0.95;
const AIM_PITCH_AMOUNT = 0.62;

// Tripod-mounted center feel: lower, centered, with limited traverse.
const GUN_ORIENTATION_TRIES = [
new THREE.Euler(-0.18, -1.50, -0.18)
];
let currentOrientationIndex = 0;
const MAX_PAN = 0.72;
const MAX_TILT = 0.42;
let raccoonFacingY = 0;

try {
  renderer = new THREE.WebGLRenderer({ canvas: gunCanvas, alpha: true, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(canvas.width, canvas.height, false);
  renderer.setClearColor(0x000000, 0);
  renderer.outputColorSpace = THREE.SRGBColorSpace;

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(50, canvas.width / canvas.height, 0.1, 100);
  camera.position.set(0, 0, 0);
  camera.lookAt(0, 0, -3);

  const ambient = new THREE.AmbientLight(0xffffff, 1.05);
  scene.add(ambient);

  const keyLight = new THREE.DirectionalLight(0xffffff, 2.15);
  keyLight.position.set(3, 4, 5);
  scene.add(keyLight);

  const fillLight = new THREE.DirectionalLight(0x9fc6ff, 1.25);
  fillLight.position.set(-4, 2, 2);
  scene.add(fillLight);

  const groundGlow = new THREE.PointLight(0xffdd8a, 1.2, 14);
  groundGlow.position.set(0, -2.1, -4);
  scene.add(groundGlow);

  gunRoot = new THREE.Group();
  scene.add(gunRoot);

  const loader = new GLTFLoader();

  loader.load(
    "Revolver.glb",
    (gltf) => {
      gunModel = gltf.scene;

      gunModel.traverse((child) => {
        if (child.isMesh) {
          child.frustumCulled = false;
          if (child.material) {
            child.material.side = THREE.DoubleSide;
            child.material.needsUpdate = true;
          }
        }
      });

      const box = new THREE.Box3().setFromObject(gunModel);
      const size = new THREE.Vector3();
      const center = new THREE.Vector3();
      box.getSize(size);
      box.getCenter(center);

      gunModel.position.sub(center);

      const maxDim = Math.max(size.x, size.y, size.z) || 1;
      gunModel.scale.setScalar(GUN_SCALE_TARGET / maxDim);

      gunRoot.add(gunModel);
      updateGunTransform();
    },
    undefined,
    (err) => {
      console.error("Could not load gun model:", err);
      gunCanvas.style.display = "none";
    }
  );

  loader.load(
    "raccoonModel.glb",
    (gltf) => {
      raccoonTemplate = gltf.scene;
      raccoonTemplate.traverse((child) => {
        if (child.isMesh) {
          child.frustumCulled = false;
          if (child.material) {
            child.material.side = THREE.DoubleSide;
            child.material.needsUpdate = true;
          }
        }
      });

      const box = new THREE.Box3().setFromObject(raccoonTemplate);
      const center = new THREE.Vector3();
      box.getCenter(center);
      raccoonTemplate.position.sub(center);
      raccoonTemplate.visible = false;
      scene.add(raccoonTemplate);
      syncRaccoonModels();
    },
    undefined,
    (err) => {
      console.warn("Could not load raccoon model. Falling back to 2D raccoons.", err);
    }
  );

  window.addEventListener("keydown", (e) => {
    // Press G to cycle gun base orientation while testing.
    if (e.key.toLowerCase() === "g") {
      currentOrientationIndex = (currentOrientationIndex + 1) % GUN_ORIENTATION_TRIES.length;
      updateGunTransform();
      console.log("Gun orientation index:", currentOrientationIndex);
    }

    if (e.key.toLowerCase() === "h") {
      raccoonFacingY = raccoonFacingY === 0 ? Math.PI : 0;
      console.log("Raccoon facing Y:", raccoonFacingY);
    }
  });

  function screenToWorld(screenX, screenY, distance) {
    const ndcX = (screenX / canvas.width) * 2 - 1;
    const ndcY = -(screenY / canvas.height) * 2 + 1;

    const fovRad = THREE.MathUtils.degToRad(camera.fov);
    const halfHeight = Math.tan(fovRad / 2) * distance;
    const halfWidth = halfHeight * camera.aspect;

    return new THREE.Vector3(ndcX * halfWidth, ndcY * halfHeight, -distance);
  }

  function syncRaccoonModels() {
    if (!raccoonTemplate || !scene) return;

    const activeIds = new Set();

    for (const r of raccoons) {
      if (!r.modelId) r.modelId = crypto.randomUUID();
      activeIds.add(r.modelId);

      let model = raccoonModelPool.get(r.modelId);
      if (!model) {
        model = raccoonTemplate.clone(true);
        model.visible = true;
        scene.add(model);
        raccoonModelPool.set(r.modelId, model);
      }

      const pos = getRaccoonScreenPosition(r);
      const distance = 8.2 - r.z * 5.6;
      const world = screenToWorld(pos.x, pos.y, distance);

      model.position.copy(world);
      model.position.y -= 0.12;

      const scale = 0.22 + r.z * 0.52;
      model.scale.setScalar(scale);

      // Face toward the player/camera. Press H during gameplay to flip if a model export needs it.
      model.rotation.set(-0.05, raccoonFacingY, 0);

      if (!r.alive) {
        model.rotation.z = 0.85;
        model.position.y -= 0.16;
      }

      model.visible = true;
    }

    for (const [id, model] of raccoonModelPool.entries()) {
      if (!activeIds.has(id)) {
        scene.remove(model);
        raccoonModelPool.delete(id);
      }
    }
  }

  function updateGunTransform() {
    if (!gunRoot) return;

    const nx = -(mouseX / canvas.width - 0.5) * 2;
    const ny = (mouseY / canvas.height - 0.5) * 2;

    const pan = THREE.MathUtils.clamp(nx * AIM_YAW_AMOUNT, -MAX_PAN, MAX_PAN);
    const tilt = THREE.MathUtils.clamp(ny * AIM_PITCH_AMOUNT, -MAX_TILT, MAX_TILT);

    gunRoot.position.copy(GUN_POSITION);
    gunRoot.position.z += recoilOffset * 0.018;

    const base = GUN_ORIENTATION_TRIES[currentOrientationIndex];

    gunRoot.rotation.set(
      base.x - tilt,
      base.y + pan,
      base.z
    );
  }

  function renderModels() {
    try {
      if (renderer && scene && camera) {
        updateGunTransform();
        syncRaccoonModels();
        renderer.render(scene, camera);
      }
    } catch (err) {
      console.error("3D render failed:", err);
      gunCanvas.style.display = "none";
    }

    requestAnimationFrame(renderModels);
  }

  renderModels();

  function resizeLayers() {
    renderer.setSize(canvas.width, canvas.height, false);
    camera.aspect = canvas.width / canvas.height;
    camera.updateProjectionMatrix();
  }

  window.addEventListener("resize", resizeLayers);
} catch (err) {
  console.error("Three.js setup failed:", err);
  gunCanvas.style.display = "none";
}

// ---------- Game logic ----------
function heartsString(v){let h="";for(let i=0;i<v;i++)h+="❤️";for(let i=v;i<MAX_HEALTH;i++)h+="🖤";return h}
function updateHUD(){scoreEl.textContent=score;ammoLeftEl.textContent=Math.max(MAX_SHOTS-shots,0);reloadsLeftEl.textContent=reloadsLeft;healthDisplayEl.textContent=heartsString(health);if(isReloading){reloadWarningEl.textContent="RELOADING...";reloadWarningEl.style.display="block";reloadWarningEl.style.color="#f6d94a"}else if(shots>=MAX_SHOTS&&reloadsLeft>0&&roundActive){reloadWarningEl.textContent="RELOAD";reloadWarningEl.style.display="block";reloadWarningEl.style.color="#ff2a1f"}else reloadWarningEl.style.display="none"}
function resetGameState(){raccoons=[];score=0;shots=0;shotsHit=0;shotsMissed=0;reloadsLeft=MAX_RELOADS;health=MAX_HEALTH;lastTime=0;lastSpawnTime=performance.now();lastShotTime=0;roundActive=true;isFiring=false;isReloading=false;muzzleFlashTimer=0;screenFlashTimer=0;damageFlashTimer=0;recoilOffset=0;updateHUD()}
function startRound(){hideSummary();titleScreen.style.display="none";resetGameState();requestAnimationFrame(gameLoop)}
function returnToMenu(){hideSummary();titleScreen.style.display="flex";roundActive=false;isFiring=false;isReloading=false;raccoons=[];drawScene()}
titleStartButton.addEventListener("click", startRound); closeSummaryButton.addEventListener("click", returnToMenu); playAgainButton.addEventListener("click", startRound);
window.addEventListener("keydown",e=>{if(e.key.toLowerCase()==="r")reloadWeapon();if(e.key==="Escape")returnToMenu()});
function updateMousePosition(clientX,clientY){const rect=canvas.getBoundingClientRect();mouseX=(clientX-rect.left)*(canvas.width/rect.width);mouseY=(clientY-rect.top)*(canvas.height/rect.height)}
canvas.addEventListener("mousemove",e=>updateMousePosition(e.clientX,e.clientY));canvas.addEventListener("mousedown",e=>{updateMousePosition(e.clientX,e.clientY);if(currentWeapon.fireMode==="semi"){fireWeapon(performance.now());}});window.addEventListener("mouseup",()=>isFiring=false);canvas.addEventListener("mouseleave",()=>isFiring=false);
canvas.addEventListener("touchstart",e=>{e.preventDefault();const t=e.touches[0];updateMousePosition(t.clientX,t.clientY);isFiring=true;fireWeapon(performance.now())},{passive:false});canvas.addEventListener("touchmove",e=>{e.preventDefault();const t=e.touches[0];updateMousePosition(t.clientX,t.clientY)},{passive:false});window.addEventListener("touchend",()=>isFiring=false);
function reloadWeapon(){if(!roundActive||isReloading||shots===0||reloadsLeft<=0)return;isReloading=true;isFiring=false;updateHUD();setTimeout(()=>{if(!roundActive)return;shots=0;reloadsLeft--;isReloading=false;lastShotTime=0;updateHUD()},RELOAD_TIME)}
function fireWeapon(now){if(!roundActive||isReloading)return;if(shots>=currentWeapon.maxShots){if(currentWeapon===WEAPONS.m2){currentWeapon=WEAPONS.revolver;shots=0;lastShotTime=0;m2ChargeStartTime=performance.now();}updateHud();return;}if(now-lastShotTime<currentWeapon.fireInterval)return;lastShotTime=now;shots++;playGunshotSound();muzzleFlashTimer=55;screenFlashTimer=38;recoilOffset=11;let didHit=false;for(let i=raccoons.length-1;i>=0;i--){const r=raccoons[i];if(!r.alive)continue;const pos=getRaccoonScreenPosition(r),dx=mouseX-pos.x,dy=mouseY-pos.y;if(Math.hypot(dx,dy)<=pos.radius){r.alive=false;r.hit=true;score+=10;shotsHit++;didHit=true;playRaccoonDeathSound();break}}if(!didHit)shotsMissed++;updateHUD()}
function spawnRaccoon(now){const d=Math.min(score/DIFFICULTY_SCORE_TARGET,1),interval=SPAWN_INTERVAL_START-(SPAWN_INTERVAL_START-SPAWN_INTERVAL_MIN)*d;if(now-lastSpawnTime<interval)return;lastSpawnTime=now;const laneX=canvas.width*.16+Math.random()*canvas.width*.68,speed=(RACCOON_SPEED_MIN+Math.random()*(RACCOON_SPEED_MAX-RACCOON_SPEED_MIN))*(1+d*.48);raccoons.push({laneX,z:.03,speed,alive:true,hit:false,deathTimer:0})}
function update(dt,now){if (currentWeapon === WEAPONS.revolver && !m2Ready){const elapsed = now - m2ChargeStartTime;if(elapsed >= m2ChargeMs){m2Ready = true;}}const s=dt/1000;if(isFiring && currentWeapon.fireMode === "auto"){fireWeapon(now);}if(muzzleFlashTimer>0)muzzleFlashTimer-=dt;if(screenFlashTimer>0)screenFlashTimer-=dt;if(damageFlashTimer>0)damageFlashTimer-=dt;if(recoilOffset>0){recoilOffset*=.78;if(recoilOffset<.2)recoilOffset=0}for(let i=raccoons.length-1;i>=0;i--){const r=raccoons[i];if(r.alive){r.z+=r.speed*s;if(r.z>=1){r.alive=false;r.hit=false;health=Math.max(health-1,0);damageFlashTimer=170;updateHUD()}}else{r.deathTimer+=dt;r.z+=.2*s;if(r.deathTimer>430||r.z>1.2)raccoons.splice(i,1)}}}
function getRaccoonScreenPosition(r){const z=Math.max(.03,Math.min(r.z,1)),cx=canvas.width/2;return{x:cx+(r.laneX-cx)*z,y:HORIZON_Y+(GROUND_Y-HORIZON_Y)*z,radius:RACCOON_BASE_RADIUS+(RACCOON_MAX_RADIUS-RACCOON_BASE_RADIUS)*z}}
function ensureAudioContext(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playGunshotSound(){ensureAudioContext();const duration=.055,sampleRate=audioCtx.sampleRate,buffer=audioCtx.createBuffer(1,sampleRate*duration,sampleRate),data=buffer.getChannelData(0);for(let i=0;i<data.length;i++)data[i]=(Math.random()*2-1)*Math.pow(1-i/data.length,2);const noise=audioCtx.createBufferSource();noise.buffer=buffer;const gain=audioCtx.createGain();gain.gain.setValueAtTime(1.05,audioCtx.currentTime);gain.gain.exponentialRampToValueAtTime(.01,audioCtx.currentTime+duration);const filter=audioCtx.createBiquadFilter();filter.type="lowpass";filter.frequency.setValueAtTime(900,audioCtx.currentTime);noise.connect(filter);filter.connect(gain);gain.connect(audioCtx.destination);noise.start()}
function playRaccoonDeathSound(){ensureAudioContext();const now=audioCtx.currentTime,osc=audioCtx.createOscillator();osc.type="triangle";osc.frequency.setValueAtTime(900,now);osc.frequency.linearRampToValueAtTime(1400,now+.03);osc.frequency.exponentialRampToValueAtTime(300,now+.18);const gain=audioCtx.createGain();gain.gain.setValueAtTime(.08,now);gain.gain.exponentialRampToValueAtTime(.001,now+.18);const lfo=audioCtx.createOscillator(),lfoGain=audioCtx.createGain();lfo.frequency.value=35;lfoGain.gain.value=40;lfo.connect(lfoGain);lfoGain.connect(osc.frequency);osc.connect(gain);gain.connect(audioCtx.destination);osc.start(now);lfo.start(now);osc.stop(now+.18);lfo.stop(now+.18)}

function drawBackground(){
  const sky=ctx.createLinearGradient(0,0,0,canvas.height);
  sky.addColorStop(0,"#07101a");
  sky.addColorStop(.47,"#101f18");
  sky.addColorStop(1,"#18240f");
  ctx.fillStyle=sky;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  if(bgImage.complete && bgImage.naturalWidth>0){
    ctx.drawImage(bgImage,0,0,canvas.width,canvas.height);
  }else{
    ctx.save();

    ctx.fillStyle="rgba(255,255,235,.88)";
    ctx.beginPath();
    ctx.arc(canvas.width*.64,canvas.height*.17,23,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle="#06100d";
    for(let i=0;i<34;i++){
      const x=i*42-20;
      const h=60+Math.sin(i*1.7)*25;
      ctx.beginPath();
      ctx.moveTo(x,HORIZON_Y);
      ctx.lineTo(x+20,HORIZON_Y-h);
      ctx.lineTo(x+42,HORIZON_Y);
      ctx.closePath();
      ctx.fill();
    }

    ctx.fillStyle="#2b2617";
    ctx.beginPath();
    ctx.moveTo(canvas.width*.42,HORIZON_Y);
    ctx.lineTo(canvas.width*.58,HORIZON_Y);
    ctx.lineTo(canvas.width*.74,canvas.height);
    ctx.lineTo(canvas.width*.24,canvas.height);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle="rgba(120,85,55,.75)";
    ctx.lineWidth=8;
    ctx.beginPath();
    ctx.moveTo(canvas.width*.82,HORIZON_Y+50);
    ctx.lineTo(canvas.width,HORIZON_Y+12);
    ctx.moveTo(canvas.width*.82,HORIZON_Y+85);
    ctx.lineTo(canvas.width,HORIZON_Y+50);
    ctx.stroke();

    ctx.restore();
  }

  const v=ctx.createRadialGradient(canvas.width/2,canvas.height/2,canvas.width*.2,canvas.width/2,canvas.height/2,canvas.width*.72);
  v.addColorStop(0,"rgba(0,0,0,0)");
  v.addColorStop(1,"rgba(0,0,0,.52)");
  ctx.fillStyle=v;
  ctx.fillRect(0,0,canvas.width,canvas.height);
}
function drawCrosshair(){ctx.save();ctx.strokeStyle="rgba(255,255,255,.85)";ctx.lineWidth=3;const size=18,gap=9;ctx.beginPath();ctx.moveTo(mouseX-size-gap,mouseY);ctx.lineTo(mouseX-gap,mouseY);ctx.moveTo(mouseX+gap,mouseY);ctx.lineTo(mouseX+size+gap,mouseY);ctx.moveTo(mouseX,mouseY-size-gap);ctx.lineTo(mouseX,mouseY-gap);ctx.moveTo(mouseX,mouseY+gap);ctx.lineTo(mouseX,mouseY+size+gap);ctx.stroke();ctx.fillStyle="rgba(255,255,255,.9)";ctx.beginPath();ctx.arc(mouseX,mouseY,2.5,0,Math.PI*2);ctx.fill();ctx.restore()}

function drawRaccoons(){
  // Fallback only: if the 3D raccoon model has not loaded, keep simple 2D targets visible.
  if(raccoonTemplate) return;

  const sorted=[...raccoons].sort((a,b)=>a.z-b.z);
  for(const r of sorted){
    const p=getRaccoonScreenPosition(r);
    ctx.save();
    if(!r.alive)ctx.globalAlpha=Math.max(1-r.deathTimer/430,0);
    ctx.fillStyle="rgba(0,0,0,.45)";
    ctx.beginPath();
    ctx.ellipse(p.x,p.y+p.radius*.75,p.radius*.9,p.radius*.22,0,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle="#3f4140";
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle="#111";
    ctx.beginPath();
    ctx.ellipse(p.x,p.y,p.radius*.9,p.radius*.43,0,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle="#e6e6d6";
    ctx.beginPath();
    ctx.arc(p.x-p.radius*.33,p.y,p.radius*.13,0,Math.PI*2);
    ctx.arc(p.x+p.radius*.33,p.y,p.radius*.13,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle="#000";
    ctx.beginPath();
    ctx.arc(p.x-p.radius*.33,p.y,p.radius*.06,0,Math.PI*2);
    ctx.arc(p.x+p.radius*.33,p.y,p.radius*.06,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

  function drawMuzzleFlash(){
  if(muzzleFlashTimer<=0)return;
  const a=Math.max(muzzleFlashTimer/55,0);
  const baseX=canvas.width*.5,baseY=canvas.height*.83;
  const angle=Math.atan2(mouseY-baseY,mouseX-baseX);
  const mx=baseX+Math.cos(angle)*100;
  const my=baseY+Math.sin(angle)*100;
  ctx.save();
  ctx.fillStyle=`rgba(255,226,90,${.75*a})`;
  ctx.beginPath();
  ctx.arc(mx,my,34,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle=`rgba(255,95,15,${.55*a})`;
  ctx.beginPath();
  ctx.arc(mx,my,17,0,Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawScreenFlash(){if(screenFlashTimer<=0)return;const a=Math.max(screenFlashTimer/38,0)*.18;ctx.save();ctx.fillStyle=`rgba(255,235,170,${a})`;ctx.fillRect(0,0,canvas.width,canvas.height);ctx.restore()}
function drawDamageFlash(){if(damageFlashTimer<=0)return;const a=Math.max(damageFlashTimer/170,0)*.36;ctx.save();ctx.fillStyle=`rgba(255,0,0,${a})`;ctx.fillRect(0,0,canvas.width,canvas.height);ctx.restore()}
function drawScene(){ctx.clearRect(0,0,canvas.width,canvas.height);drawBackground();drawRaccoons();
                     //drawMuzzleFlash();
                     drawScreenFlash();drawDamageFlash();drawCrosshair();updateHUD()}
function gameLoop(t){if(!roundActive)return;if(!lastTime)lastTime=t;const dt=t-lastTime;lastTime=t;if(health<=0||(shots>=MAX_SHOTS&&reloadsLeft<=0)){isFiring=false;update(dt,t);drawScene();endRound();return}spawnRaccoon(t);update(dt,t);drawScene();requestAnimationFrame(gameLoop)}
function showSummary(){summaryScoreEl.textContent=score;summaryShotsHitEl.textContent=shotsHit;summaryShotsMissedEl.textContent=shotsMissed;summaryHealthTextEl.textContent=heartsString(health);if(health<=0){endTitleEl.textContent="GAME OVER";endTitleEl.style.color="#ff0000"}else if(shots>=MAX_SHOTS&&reloadsLeft<=0){endTitleEl.textContent="OUT OF AMMO";endTitleEl.style.color="#ff1f1f"}else{endTitleEl.textContent="SUMMARY";endTitleEl.style.color="#fff"}endOverlay.style.display="block"}
function hideSummary(){endOverlay.style.display="none"}function endRound(){roundActive=false;isReloading=false;showSummary()}
bgImage.onload=()=>drawScene(); bgImage.onerror=()=>{ console.warn("Background image failed to load; using fallback background."); drawScene(); };
drawScene();
</script>
